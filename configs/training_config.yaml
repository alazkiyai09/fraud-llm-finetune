training:
  num_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_seq_length: 1024
  fp16: true
  bf16: false
  gradient_checkpointing: true
  logging_steps: 10
  save_strategy: "epoch"
  evaluation_strategy: "epoch"
  report_to: "wandb"
